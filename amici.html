<!DOCTYPE html>
<html lang="it">
<head>

<title>nduma — Amici</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<!-- Pagine vicine precaricate in background (Fil, 2026-07-22): quando tocchi la barra in basso il browser le ha gia' scaricate, il salto si sente piu' veloce. Solo un suggerimento (il browser decide lui se/quando farlo, in base a rete e batteria) -- niente da rompere se lo ignora, es. Safari iOS lo supporta poco. -->
<link rel="prefetch" href="index.html">
<link rel="prefetch" href="eventi.html">
<link rel="prefetch" href="crea.html">
<link rel="prefetch" href="profilo.html">
<meta name="theme-color" content="#FF7A29">
<meta name="color-scheme" content="light dark">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="nduma">
<script>
  /* Fix navbar tagliata sull'app installata (PWA a schermo intero): su alcuni
     Android/Chrome 100dvh non combacia col vero window.innerHeight quando
     l'app gira standalone, e la navbar finisce a metà, sotto la gesture bar.
     Misuriamo noi lo spazio vero e lo passiamo a style.css via --app-height.
     Solo in standalone: in Safari normale (scheda del browser) 100dvh da solo
     si aggiorna già correttamente quando la barra degli indirizzi si nasconde/
     mostra, mentre un innerHeight misurato una volta e aggiornato solo su
     resize/orientationchange restava indietro e lasciava una striscia grigia
     sotto la tab bar (bug notato da Fil su iPhone il 2026-07-05). */
  (function () {
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (!isStandalone) return;
    function setAppHeight() {
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
    }
    setAppHeight();
    window.addEventListener('resize', setAppHeight);
    window.addEventListener('orientationchange', setAppHeight);
  })();
</script>
</head>
<body>

  <div class="phone">
   <div class="screen">
    <div class="header simple">
      <div class="header-title">Amici</div>
    </div>

    <div class="content" id="pageContent">
      <!-- Il contenuto qui sotto viene sostituito con un messaggio bloccante
           da questo stesso script se non hai ancora un profilo: solo chi ha
           un account può creare liste amici (vedi commento più sotto). -->

      <!-- Visibile solo se sei arrivato qui da "+ Crea una lista amici" nel
           form di un evento (crea.html): resta finché non premi tu, così puoi
           anche aggiungere amici alla lista prima di tornare indietro. -->
      <div id="returnToEventBanner" style="display:none; margin-bottom:16px;">
        <div class="share-box" style="text-align:center;">
          <div class="share-label" style="margin-bottom:10px;">Stai creando un evento</div>
          <div class="add-date-btn" id="returnToEventBtn" style="margin-bottom:0;">← Torna a creare l'evento</div>
        </div>
      </div>

      <div class="card-date" style="margin: 0 2px 16px;">Crea liste di amici (es. "Stretti", "Conoscenti") per compilare più in fretta gli invitati quando proponi un evento.</div>

      <div class="field">
        <label>Nuova lista amici</label>
        <input type="text" id="newListInput" placeholder="Es. Amici stretti">
      </div>
      <div class="add-date-btn" id="addListBtn">+ Crea lista</div>

      <div class="form-error" id="formError"></div>

      <div class="section-title first">Le tue liste</div>
      <div id="listsContainer"></div>
    </div>
   </div>

    <div class="navbar">
      <a class="nav-item" href="index.html">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><path d="M4 11 L12 4 L20 11"></path><path d="M6 10 V20 H18 V10"></path></svg></div>
      </a>
      <a class="nav-item" href="eventi.html">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><rect x="3" y="5" width="18" height="16" rx="3"></rect><line x1="16" y1="3" x2="16" y2="7"></line><line x1="8" y1="3" x2="8" y2="7"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></div>
      </a>
      <a class="nav-item" href="crea.html">
        <div class="icon">＋</div>
      </a>
      <a class="nav-item active" href="amici.html">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><circle cx="9" cy="8.5" r="3"></circle><path d="M3 19c0-3.3 2.7-5.5 6-5.5s6 2.2 6 5.5"></path><circle cx="17" cy="9" r="2.4"></circle><path d="M15.5 13.3c2.6 0.3 4.5 2.2 4.5 5.7"></path></svg></div>
      </a>
      <a class="nav-item" href="profilo.html">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" width="19" height="19"><circle cx="12" cy="8" r="4"></circle><path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"></path></svg></div>
      </a>
    </div>

    <!-- Popup di gestione di UNA lista amici: si apre cliccando "Gestisci amici" su
         una card. Evita di dover fare una pagina html separata per ogni lista.
         Solo un elenco di nomi ad uso tuo (Fil + Virgi, 2026-07-05): niente più
         link di invito né conferma da parte di chi ci sta dentro. -->
    <div class="signup-overlay" id="friendListModal" style="display:none;">
      <div class="signup-modal" style="text-align:left; max-height:74vh; overflow-y:auto;">
        <div class="list-header" style="margin-bottom:14px;">
          <div class="card-title" id="friendModalTitle">Lista</div>
          <div class="list-delete" id="friendModalCloseBtn">Chiudi ✕</div>
        </div>

        <!-- Campo di ricerca in cima al modal (Fil, 2026-07-10): con la lista
             amici sotto, il menu a tendina dei suggerimenti account ha sempre
             spazio libero per aprirsi, invece di restare tagliato dallo
             scroll del modal quando il campo era in fondo, vicino alla
             tastiera. -->
        <div class="inline-add-row">
          <input type="text" id="friendModalInput" placeholder="Aggiungi amico...">
          <button type="button" id="friendModalAddBtn">+</button>
        </div>
        <div class="form-error" id="friendModalError"></div>
        <div id="friendModalList" style="margin-top:14px;"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
  <script>
    (async function () {
      // Fil, 2026-07-22, trovato in review dopo un bug reale in test (la
      // lista smetteva di comparire dopo qualche cambio tab, tornava solo
      // ricaricando a mano): se te ne vai da questa tab mentre una
      // richiesta di rete di questa pagina è ancora in corso (es. le foto
      // profilo degli amici, più sotto), quando arriva la risposta questo
      // script scriveva comunque sugli elementi di questa vecchia
      // schermata — ormai spariti dal DOM (rimpiazzati da quella nuova),
      // quindi la scrittura non si vedeva da nessuna parte, ma la vecchia
      // richiesta restava comunque "appesa" a girare in background.
      // "mounted" fa sì che quelle risposte tardive, quando arrivano dopo
      // che te ne sei andato, non tocchino più nulla.
      var mounted = true;
      window.__ndumaUnmount = function () { mounted = false; };

      var pageContent = document.getElementById('pageContent');

      /* Solo chi ha un profilo può creare liste amici: senza, sostituiamo il
         form + le liste con un messaggio bloccante che invita a crearne uno.
         Un ospite bloccato da un invito (checkAccessGate) viene invece
         rimandato al suo evento/lista, dato che Amici non è mai un posto
         consentito per lui. */
      var gate = NdumaData.checkAccessGate(null);
      if (gate.action === 'redirect') {
        window.location.href = gate.url;
        return;
      }
      if (gate.action === 'block') {
        pageContent.innerHTML = NdumaData.accountRequiredBlockHTML(
          'Per creare liste amici devi prima creare un profilo.'
        );
        document.querySelector('.navbar').style.display = 'none';
        return;
      }

      await NdumaData.renderSessionWarningIfNeeded(pageContent);

      var listsContainer = document.getElementById('listsContainer');
      var newListInput = document.getElementById('newListInput');
      var addListBtn = document.getElementById('addListBtn');
      var formError = document.getElementById('formError');

      /* ---------- ritorno a crea.html dopo "+ Crea una lista amici" ---------- */
      var RETURN_FLAG_KEY = 'nduma:returnToEventCreation';
      var JUST_CREATED_LIST_KEY = 'nduma:justCreatedListId';
      var returningToEvent = false;
      try { returningToEvent = sessionStorage.getItem(RETURN_FLAG_KEY) === '1'; } catch (err) { /* ignora */ }

      if (returningToEvent) {
        document.getElementById('returnToEventBanner').style.display = '';
        document.getElementById('returnToEventBtn').addEventListener('click', function () {
          try { sessionStorage.removeItem(RETURN_FLAG_KEY); } catch (err) { /* ignora */ }
          try { sessionStorage.setItem('cs-nav-direction', 'backward'); } catch (err) { /* ignora */ }
          var screen = document.querySelector('.screen');
          if (screen) screen.classList.add('slide-out-right');
          window.setTimeout(function () { window.location.href = 'crea.html'; }, 160);
        });
      }

      var friendListModal = document.getElementById('friendListModal');
      var friendModalTitle = document.getElementById('friendModalTitle');
      var friendModalList = document.getElementById('friendModalList');
      var friendModalInput = document.getElementById('friendModalInput');
      var friendModalAddBtn = document.getElementById('friendModalAddBtn');
      var friendModalError = document.getElementById('friendModalError');
      var friendModalCloseBtn = document.getElementById('friendModalCloseBtn');

      // Suggerimenti username+foto mentre scrivi (documento "ci-siamo-omonimi.pdf",
      // Opzione A, Fil 2026-07-07): se scegli un suggerimento, il collegamento
      // resta per sempre su questo amico (vedi addFriendFromInput più sotto).
      // Cliccare un suggerimento aggiunge subito l'amico (Fil, 2026-07-10),
      // niente più "+" da premere dopo.
      var friendModalSearch = null;
      if (window.NdumaUI && NdumaUI.attachAccountSearch) {
        friendModalSearch = NdumaUI.attachAccountSearch(friendModalInput, function () { addFriendFromInput(); });
      }

      var currentLists = [];
      var openListId = null;

      function friendsSummary(friends) {
        if (!friends.length) return 'Nessun amico ancora';
        return friends.length + (friends.length === 1 ? ' amico' : ' amici');
      }

      // Stessa palette di evento.html/attendee-bubble, qui ruotata per
      // posizione dentro la card invece che fissa: due liste non hanno mai
      // gli stessi colori nella stessa combinazione (Fil, 2026-07-19 — prima
      // c'era una sola iconcina grigia uguale per tutte le liste, "sembrava
      // vuoto/asettico").
      var AVATAR_GRADIENTS = [
        ['#FF7A29', '#6B3F73'],
        ['#9C6BA3', '#FF7A29'],
        ['#FFB35C', '#6B3F73'],
        ['#6B3F73', '#9C6BA3']
      ];

      // Foto vera solo per amici "collegati" (linkStatus accepted + account_id,
      // stesso criterio di renderModalContent/friendAvatarCache qui sotto);
      // per tutti gli altri, cerchio con l'iniziale su sfondo sfumato.
      function friendAvatarBubbleHTML(friend, gradientIndex, extraClass) {
        var initial = (friend.name || '?').trim().charAt(0).toUpperCase() || '?';
        var avatarUrl = (friend.linkStatus === 'accepted' && friend.accountId) ? friendAvatarCache[friend.accountId] : null;
        var gradient = AVATAR_GRADIENTS[gradientIndex % AVATAR_GRADIENTS.length];
        var inner = avatarUrl
          ? '<img src="' + NdumaData.escapeHTML(avatarUrl) + '" alt="">'
          : NdumaData.escapeHTML(initial);
        var bgStyle = avatarUrl ? '' : ' style="background:linear-gradient(135deg,' + gradient[0] + ',' + gradient[1] + ');"';
        return '<div class="friend-list-avatar' + (extraClass ? ' ' + extraClass : '') + '"' + bgStyle + '>' + inner + '</div>';
      }

      function friendListCardHTML(list, listIndex) {
        var friends = list.friends || [];
        var shown = friends.slice(0, 3);
        var extra = friends.length - shown.length;
        var avatarsHTML = shown.map(function (f, fi) { return friendAvatarBubbleHTML(f, listIndex + fi); }).join('')
          + (extra > 0 ? '<div class="friend-list-avatar friend-list-avatar-more">+' + extra + '</div>' : '');

        return ''
          + '<div class="card reveal friend-list-card" data-manage-list="' + list.id + '">'
          + '<div class="friend-list-card-top">'
          + '<div class="friend-list-card-name">' + NdumaData.escapeHTML(list.name) + '</div>'
          + '<div class="list-delete" data-delete-list="' + list.id + '">✕</div>'
          + '</div>'
          + '<div>'
          + (friends.length ? '<div class="friend-list-avatars">' + avatarsHTML + '</div>' : '')
          + '<div class="card-date friend-list-card-count">' + friendsSummary(friends) + '</div>'
          + '</div>'
          + '</div>';
      }

      async function renderLists() {
        formError.textContent = '';
        listsContainer.innerHTML = '<div class="empty-hint">Caricamento...</div>';

        var lists;
        try {
          lists = await NdumaData.getFriendLists();
        } catch (err) {
          listsContainer.innerHTML = '<div class="empty-hint">Non riesco a caricare le liste (' + NdumaData.escapeHTML(err.message) + ').</div>';
          return;
        }

        currentLists = lists;

        if (!lists.length) {
          listsContainer.innerHTML = '<div class="empty-hint">Non hai ancora nessuna lista.<br>Creane una qui sopra.</div>';
        } else {
          listsContainer.innerHTML = lists.map(friendListCardHTML).join('');

          // Foto degli amici collegati per le card appena disegnate: stesso
          // friendAvatarCache usato dal popup "Gestisci amici", così se il
          // popup era già stato aperto una volta non richiediamo di nuovo le
          // stesse foto. Se una foto arriva dopo il primo giro, si ridisegna
          // solo la griglia (non tutta la pagina).
          var neededIds = [];
          lists.forEach(function (list) {
            (list.friends || []).forEach(function (f) {
              if (f.linkStatus === 'accepted' && f.accountId && !(f.accountId in friendAvatarCache) && neededIds.indexOf(f.accountId) === -1) {
                neededIds.push(f.accountId);
              }
            });
          });
          if (neededIds.length && window.NdumaData && NdumaData.getAvatarsForAccountIds) {
            NdumaData.getAvatarsForAccountIds(neededIds).then(function (avatarMap) {
              if (!mounted) return; // te ne sei già andato da questa tab, vedi sopra
              neededIds.forEach(function (id) {
                friendAvatarCache[id] = (avatarMap[id] && avatarMap[id].avatarUrl) || null;
              });
              listsContainer.innerHTML = lists.map(friendListCardHTML).join('');
              if (window.NdumaUI) window.NdumaUI.refresh();
            }).catch(function () { /* niente foto, restano le iniziali: non blocca nulla */ });
          }
        }

        // se il popup di gestione lista è già aperto, aggiorna anche quello con i dati freschi
        if (openListId) {
          var stillOpen = currentLists.filter(function (l) { return l.id === openListId; })[0];
          if (stillOpen) {
            renderModalContent(stillOpen);
          } else {
            closeFriendModal();
          }
        }

        // rianima/rende cliccabile il contenuto appena creato
        if (window.NdumaUI) window.NdumaUI.refresh();
      }

      // Cache locale { accountId: avatarUrl|null }, così non richiediamo di
      // nuovo la stessa foto ogni volta che la lista si ridisegna (succede
      // spesso: dopo ogni aggiunta/rimozione amico si passa da loadLists()).
      var friendAvatarCache = {};

      function renderModalContent(list) {
        friendModalTitle.textContent = list.name;

        if (!list.friends.length) {
          friendModalList.innerHTML = '<div class="empty-hint" style="padding:14px 0;">Nessun amico ancora.<br>Aggiungine uno qui sotto.</div>';
          return;
        }

        friendModalList.innerHTML = list.friends.map(function (f) {
          // "Amicizia vera" (Fil, 2026-07-12): scegliere un account dai
          // suggerimenti username+foto non collega più subito — parte una
          // richiesta, il destinatario deve accettarla lui da Notifiche.
          // Solo dopo (linkStatus 'accepted') si vede la foto vera; mentre è
          // in attesa si vede un indicatore diverso, non ancora "collegato".
          var linkedMarker = '';
          if (f.linkStatus === 'accepted' && f.accountId) {
            var avatarUrl = friendAvatarCache[f.accountId];
            var initial = (f.name.trim().charAt(0) || '?').toUpperCase();
            linkedMarker = avatarUrl
              ? '<span class="linked-mini-avatar" title="Amicizia confermata"><img src="' + NdumaData.escapeHTML(avatarUrl) + '" alt=""></span>'
              : '<span class="linked-mini-avatar" title="Amicizia confermata">' + NdumaData.escapeHTML(initial) + '</span>';
          } else if (f.linkStatus === 'pending') {
            linkedMarker = '<span class="linked-mini-avatar" style="background:var(--butter-soft); color:var(--ink);" title="In attesa che confermi lui/lei">⏳</span>';
          }
          return ''
            + '<div class="settings-row" style="margin-bottom:8px;">'
            + '<div class="left" style="display:flex; align-items:center;">' + linkedMarker + NdumaData.escapeHTML(f.name) + '</div>'
            + '<span class="friend-remove" data-remove-friend="' + f.id + '">✕</span>'
            + '</div>';
        }).join('');

        var missingIds = list.friends
          .filter(function (f) { return f.linkStatus === 'accepted'; })
          .map(function (f) { return f.accountId; })
          .filter(function (id) { return id && !(id in friendAvatarCache); });
        if (missingIds.length && window.NdumaData && NdumaData.getAvatarsForAccountIds) {
          NdumaData.getAvatarsForAccountIds(missingIds).then(function (avatarMap) {
            if (!mounted) return; // te ne sei già andato da questa tab, vedi sopra
            missingIds.forEach(function (id) {
              friendAvatarCache[id] = (avatarMap[id] && avatarMap[id].avatarUrl) || null;
            });
            if (openListId === list.id) renderModalContent(list);
          }).catch(function () { /* niente foto, resta l'iniziale: non blocca nulla */ });
        }
      }

      function openFriendModal(listId) {
        var list = currentLists.filter(function (l) { return l.id === listId; })[0];
        if (!list) return;
        openListId = listId;
        friendModalInput.value = '';
        friendModalError.textContent = '';
        renderModalContent(list);
        friendListModal.style.display = '';
      }

      function closeFriendModal() {
        openListId = null;
        friendListModal.style.display = 'none';
      }

      addListBtn.addEventListener('click', async function () {
        var name = newListInput.value.trim();
        if (!name) {
          formError.textContent = 'Scrivi un nome per la lista.';
          return;
        }
        var newList;
        try {
          newList = await NdumaData.createFriendList(name);
        } catch (err) {
          formError.textContent = 'Non sono riuscito a creare la lista (' + err.message + ').';
          return;
        }
        // se stai tornando a un evento in bozza, ricorda quale lista hai appena
        // creato: crea.html la preseleziona da sola quando torni indietro
        if (returningToEvent && newList) {
          try { sessionStorage.setItem(JUST_CREATED_LIST_KEY, newList.id); } catch (err) { /* ignora */ }
        }
        newListInput.value = '';
        await renderLists();
        // Fil, 2026-07-05: appena crei la lista si apre subito il popup per
        // aggiungere amici, invece di doverlo riaprire tu da "Gestisci amici".
        if (newList) {
          openFriendModal(newList.id);
          // fumetto "una volta sola" (Fil, 2026-07-07): solo qui, appena crei
          // una lista, è il momento giusto per spiegare cos'è — non prima,
          // quando la lista ancora non esiste. Sparisce appena tocchi il
          // campo per aggiungere il primo amico (a quel punto arriva anche
          // il fumetto di NdumaUI.attachAccountSearch, in sequenza).
          if (window.NdumaUI && NdumaUI.showOnceHint) {
            NdumaUI.showOnceHint('friendListConcept', friendModalList.parentElement,
              'Una lista amici è solo un elenco di nomi pronti da riusare: non invita nessuno adesso, serve solo per compilare più in fretta i prossimi eventi.',
              friendModalInput, ['focus']);
          }
        }
      });

      listsContainer.addEventListener('click', async function (e) {
        // closest(), non e.target diretto (Fil, 2026-07-19): ora tutta la
        // card apre "Gestisci amici", quindi e.target è quasi sempre un
        // elemento dentro la card (il nome, gli avatar...) e non la card
        // stessa. La ✕ va controllata per prima e con un return, altrimenti
        // cliccarla aprirebbe anche il popup di gestione (è annidata dentro
        // la card che ha data-manage-list).
        var deleteEl = e.target.closest('[data-delete-list]');
        if (deleteEl) {
          var deleteListId = deleteEl.getAttribute('data-delete-list');
          if (window.confirm('Eliminare questa lista di amici?')) {
            try {
              await NdumaData.deleteFriendList(deleteListId);
            } catch (err) {
              formError.textContent = 'Non sono riuscito a eliminare la lista (' + err.message + ').';
              return;
            }
            renderLists();
          }
          return;
        }

        var manageEl = e.target.closest('[data-manage-list]');
        if (manageEl) {
          openFriendModal(manageEl.getAttribute('data-manage-list'));
        }
      });

      friendModalCloseBtn.addEventListener('click', closeFriendModal);

      // click fuori dalla card (sullo sfondo scuro) chiude il popup
      friendListModal.addEventListener('click', function (e) {
        if (e.target === friendListModal) closeFriendModal();
      });

      // Estratta in una funzione a sé (non solo il click del "+") perché la
      // richiama anche NdumaUI.attachAccountSearch qui sotto: cliccare un
      // profilo trovato nel menu di ricerca deve aggiungerlo subito, senza
      // dover premere "+" un'altra volta (Fil, 2026-07-10).
      async function addFriendFromInput() {
        var name = friendModalInput.value.trim();
        if (!name) {
          friendModalError.textContent = 'Scrivi un nome.';
          return;
        }
        friendModalError.textContent = '';

        // Se il testo combacia ancora con un suggerimento scelto (username+foto),
        // il collegamento resta sull'amico per sempre (Fil, 2026-07-07) — vedi
        // NdumaUI.attachAccountSearch: si annulla da solo se modifichi il testo.
        var linkedAccountId = (friendModalInput.dataset.linkedUsername === name)
          ? (friendModalInput.dataset.linkedAccountId || null)
          : null;

        try {
          await NdumaData.addFriendToList(openListId, name, linkedAccountId);
        } catch (err) {
          friendModalError.textContent = 'Non sono riuscito ad aggiungere l\'amico (' + err.message + ').';
          return;
        }
        friendModalInput.value = '';
        delete friendModalInput.dataset.linkedAccountId;
        delete friendModalInput.dataset.linkedUsername;
        renderLists();
      }

      // Prima di aggiungere aspetta che la ricerca account per il nome
      // scritto sia finita (Fil, 2026-07-13): scrivendo veloce e premendo
      // subito Invio/+, senza questa attesa il suggerimento non fa in tempo
      // ad arrivare e l'amico finisce aggiunto "a vuoto" anche se quella
      // persona è già registrata. Il pulsante mostra "···" nel frattempo,
      // di solito per una frazione di secondo.
      async function triggerAddFriend() {
        if (!friendModalSearch) { addFriendFromInput(); return; }
        var originalLabel = friendModalAddBtn.textContent;
        friendModalAddBtn.disabled = true;
        friendModalAddBtn.textContent = '···';
        try {
          // La ricerca vera spesso torna in una manciata di decine di
          // millisecondi: troppo veloce per accorgersi che il pulsante si
          // è davvero disabilitato (Fil, 2026-07-13, dopo aver provato dal
          // telefono: "il + rimane sempre cliccabile"). Un minimo di attesa
          // visibile (non finta: la ricerca corre comunque in parallelo)
          // rende chiaro che sta succedendo qualcosa.
          await Promise.all([friendModalSearch.flush(), new Promise(function (r) { window.setTimeout(r, 450); })]);
        } finally {
          friendModalAddBtn.disabled = false;
          friendModalAddBtn.textContent = originalLabel;
        }
        addFriendFromInput();
      }

      friendModalAddBtn.addEventListener('click', triggerAddFriend);

      friendModalInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') { e.preventDefault(); triggerAddFriend(); }
      });

      friendModalList.addEventListener('click', async function (e) {
        var removeFriendId = e.target.getAttribute('data-remove-friend');
        if (removeFriendId) {
          try {
            await NdumaData.removeFriendFromList(openListId, removeFriendId);
          } catch (err) {
            friendModalError.textContent = 'Non sono riuscito a rimuovere l\'amico (' + err.message + ').';
            return;
          }
          renderLists();
        }
      });

      renderLists();
    })();
  </script>
</body>
</html>
